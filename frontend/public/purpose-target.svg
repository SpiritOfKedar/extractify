<svg width="360" height="360" viewBox="0 0 360 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer ring -->
  <circle cx="180" cy="180" r="150" stroke="#ece8f5" stroke-width="20" fill="none"/>
  <!-- Middle ring -->
  <circle cx="180" cy="180" r="110" stroke="#d4c5f0" stroke-width="16" fill="none"/>
  <!-- Inner ring -->
  <circle cx="180" cy="180" r="72" stroke="#b89de8" stroke-width="14" fill="none"/>
  <!-- Bullseye -->
  <circle cx="180" cy="180" r="40" fill="#6F40DD"/>
  <!-- Dart/arrow -->
  <line x1="260" y1="100" x2="195" y2="165" stroke="#2d2d2d" stroke-width="3" stroke-linecap="round"/>
  <polygon points="195,165 205,152 208,168" fill="#2d2d2d"/>
  <!-- Dart tail feathers -->
  <line x1="260" y1="100" x2="275" y2="85" stroke="#FF6B6B" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="260" y1="100" x2="270" y2="80" stroke="#FF6B6B" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="260" y1="100" x2="280" y2="90" stroke="#FF6B6B" stroke-width="2.5" stroke-linecap="round"/>
</svg>
