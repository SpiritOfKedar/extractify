# ============================================================
# Extractify – Development Overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# ============================================================
# Mounts source code for hot-reload and runs dev servers instead
# of production builds.

services:
  # ── PostgreSQL ──────────────────────────────────
  # Local dev database (production uses Neon cloud DB)
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: extractify
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d extractify"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Mount source so file changes trigger uvicorn --reload
    volumes:
      - ./backend:/app
    # Override CMD to enable auto-reload on code changes
    command: ["bash", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"]
    environment:
      APP_ENV: development
      DEBUG: "true"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/extractify
    depends_on:
      postgres:
        condition: service_healthy

  # ── Next.js Frontend ─────────────────────────────
  frontend:
    # Skip the production Dockerfile; use a simple dev container instead
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      # Prevent host node_modules from overwriting the container's
      - /app/node_modules
      - /app/.next
    # Override to run the Next.js dev server with hot-reload
    command: ["npm", "run", "dev"]
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_GTM_ID: ${NEXT_PUBLIC_GTM_ID:-}

volumes:
  pgdata:
